<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Arman Store WMS</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════════════════════════════════════ */
:root {
  --bar-h:        60px;   /* MUST match TABBAR_HEIGHT in main.js */
  --c-bg:         #0D1554;
  --c-nav:        #111D6B;
  --c-tab:        #1A277A;
  --c-tab-hover:  #223194;
  --c-tab-active: #1358AD;
  --c-accent:     #3B9EF5;
  --c-accent-dim: rgba(59,158,245,.18);
  --c-border:     rgba(255,255,255,.10);
  --c-text:       #CBD5F8;
  --c-text-hi:    #FFFFFF;
  --c-text-dim:   #5E70B5;
  --c-success:    #4CAF82;
  --c-warn:       #F5A623;
  --c-danger:     #E05252;
  --radius:       7px;
  --shadow:       0 2px 16px rgba(0,0,0,.45);
  --trans:        .15s ease;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

html, body {
  height: var(--bar-h);
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 13px;
  background: var(--c-bg);
  color: var(--c-text);
  user-select: none;
  -webkit-app-region: drag;
}

button {
  border: none; background: transparent; color: inherit;
  cursor: pointer; font: inherit;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 5px;
  transition: background var(--trans), color var(--trans), opacity var(--trans);
}
button:focus-visible { outline: 2px solid var(--c-accent); outline-offset: 2px; }

/* ═══════════════════════════════════════════════════════════════
   TOP BAR  (the only visible thing — shell is 60 px tall)
═══════════════════════════════════════════════════════════════ */
#bar {
  display: flex;
  align-items: center;
  height: var(--bar-h);
  padding: 0 6px;
  gap: 4px;
  -webkit-app-region: no-drag;
  background: var(--c-bg);
}

/* ── Section separator ── */
.sep {
  width: 1px; height: 26px;
  background: var(--c-border);
  flex-shrink: 0;
}

/* ── Icon nav buttons (back / fwd / reload / home) ── */
.nbtn {
  width: 34px; height: 34px;
  border-radius: 50%;
  color: var(--c-text-dim);
  font-size: 16px;
  flex-shrink: 0;
}
.nbtn:hover:not(:disabled) { background: rgba(255,255,255,.10); color: var(--c-text-hi); }
.nbtn:disabled { opacity: .28; cursor: default; }

/* ── Scrollable tab strip ── */
#tab-scroll {
  flex: 1; min-width: 0;
  display: flex; align-items: center;
  overflow-x: auto; overflow-y: hidden;
  gap: 3px;
  height: 100%;
  padding: 10px 0;
  scrollbar-width: none;
}
#tab-scroll::-webkit-scrollbar { display: none; }

/* ── Single tab ── */
.tab {
  display: flex; align-items: center;
  min-width: 148px; max-width: 220px;
  height: 38px;
  background: var(--c-tab);
  border: 1px solid transparent;
  border-radius: var(--radius);
  padding: 0 8px 0 10px;
  gap: 7px;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  transition: background var(--trans), border-color var(--trans);
}
.tab:hover { background: var(--c-tab-hover); }
.tab.active {
  background: var(--c-tab-active);
  border-color: var(--c-accent);
  box-shadow: 0 0 0 1px rgba(59,158,245,.25);
}
.tab.active::after {
  content:'';
  position: absolute;
  bottom: -1px; left: 8px; right: 8px;
  height: 2px;
  background: var(--c-accent);
  border-radius: 2px 2px 0 0;
}

/* Spinner (shown while loading) */
.tab-spin {
  width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,.15);
  border-top-color: var(--c-accent);
  border-radius: 50%;
  flex-shrink: 0;
  display: none;
  animation: spin .65s linear infinite;
}
.tab.loading .tab-spin { display: block; }

@keyframes spin { to { transform: rotate(360deg); } }

/* Favicon */
.tab-fav {
  width: 14px; height: 14px;
  border-radius: 2px;
  flex-shrink: 0;
  object-fit: contain;
}
.tab-fav-ph {
  width: 14px; height: 14px;
  border-radius: 3px;
  background: var(--c-text-dim);
  flex-shrink: 0;
}
.tab.loading .tab-fav,
.tab.loading .tab-fav-ph { display: none; }

/* Title */
.tab-ttl {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 12px;
  color: var(--c-text);
  opacity: .85;
}
.tab.active .tab-ttl { color: var(--c-text-hi); font-weight: 500; opacity: 1; }

/* Close × */
.tab-x {
  width: 18px; height: 18px;
  border-radius: 50%;
  font-size: 14px;
  color: var(--c-text-dim);
  flex-shrink: 0;
  opacity: 0;
  transition: background var(--trans), color var(--trans), opacity var(--trans);
}
.tab:hover .tab-x,
.tab.active .tab-x { opacity: 1; }
.tab-x:hover { background: rgba(224,82,82,.22); color: var(--c-danger); }

/* ── New-tab button ── */
#btn-new {
  width: 34px; height: 34px;
  border-radius: 50%;
  font-size: 22px;
  color: var(--c-text-dim);
  flex-shrink: 0;
}
#btn-new:hover { background: rgba(255,255,255,.10); color: var(--c-text-hi); }

/* ── Action buttons (Print / PDF / Downloads) ── */
.abtn {
  height: 32px;
  padding: 0 11px;
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--c-text-dim);
  white-space: nowrap;
  flex-shrink: 0;
  gap: 5px;
}
.abtn:hover { background: rgba(255,255,255,.09); color: var(--c-text-hi); }
.abtn.hi { color: var(--c-accent); }
.abtn.hi:hover { background: var(--c-accent-dim); }

/* ── Zoom control ── */
#zoom-grp {
  display: flex; align-items: center; gap: 2px;
  flex-shrink: 0;
}
#zoom-lbl {
  min-width: 40px; text-align: center;
  font-size: 11px; font-variant-numeric: tabular-nums;
  color: var(--c-text-dim);
}

/* ── Find icon ── */
#btn-find {
  width: 34px; height: 34px; border-radius: 50%; font-size: 15px;
  color: var(--c-text-dim); flex-shrink: 0;
}
#btn-find:hover { background: rgba(255,255,255,.10); color: var(--c-text-hi); }

/* ═══════════════════════════════════════════════════════════════
   FIND BAR
═══════════════════════════════════════════════════════════════ */
#find-bar {
  position: fixed;
  top: var(--bar-h);
  right: 14px;
  background: #131F78;
  border: 1px solid var(--c-accent);
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 7px 10px;
  display: flex; align-items: center; gap: 6px;
  z-index: 9000;
  box-shadow: var(--shadow);
  transform: translateY(-110%);
  opacity: 0;
  pointer-events: none;
  transition: transform .22s ease, opacity .22s ease;
}
#find-bar.open { transform: translateY(0); opacity: 1; pointer-events: all; }

#find-inp {
  width: 210px; height: 30px;
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 6px;
  background: rgba(255,255,255,.07);
  color: #fff;
  padding: 0 10px;
  font-size: 12px;
  outline: none;
  transition: border-color var(--trans);
}
#find-inp:focus { border-color: var(--c-accent); }

#find-count { font-size: 11px; color: var(--c-text-dim); min-width: 50px; }

.find-btn {
  width: 28px; height: 28px; border-radius: 50%; font-size: 14px;
  color: var(--c-text-dim);
}
.find-btn:hover { background: rgba(255,255,255,.1); color: #fff; }

/* ═══════════════════════════════════════════════════════════════
   DOWNLOAD TRAY  (bottom-right slide-up cards)
═══════════════════════════════════════════════════════════════ */
#dl-tray {
  position: fixed;
  bottom: 14px; right: 14px;
  width: 310px;
  display: flex; flex-direction: column; gap: 7px;
  z-index: 9999;
  pointer-events: none;
}

.dl-card {
  background: #131F78;
  border: 1px solid var(--c-border);
  border-radius: 10px;
  padding: 11px 13px 10px;
  pointer-events: all;
  animation: slideUp .22s ease;
  box-shadow: var(--shadow);
}
@keyframes slideUp { from { transform: translateY(18px); opacity: 0; } }

.dl-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.dl-ico  { font-size: 20px; flex-shrink: 0; }
.dl-name {
  flex: 1; font-size: 12px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--c-text-hi);
}
.dl-dismiss {
  font-size: 15px; padding: 2px 4px;
  color: var(--c-text-dim); border-radius: 4px;
}
.dl-dismiss:hover { color: var(--c-danger); background: rgba(224,82,82,.15); }

.dl-track { height: 5px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden; }
.dl-bar   { height: 100%; background: var(--c-accent); border-radius: 3px; width: 0; transition: width .3s; }
.dl-bar.indet {
  width: 35%;
  animation: indet 1.1s ease-in-out infinite alternate;
}
@keyframes indet { to { margin-left: 65%; } }

.dl-stat { font-size: 11px; color: var(--c-text-dim); margin-top: 5px; }

.dl-actions { display: none; gap: 6px; margin-top: 8px; }
.dl-card.done .dl-actions,
.dl-card.fail .dl-actions { display: flex; }

.dl-act-btn {
  flex: 1; height: 28px; border-radius: 6px;
  font-size: 11px; font-weight: 500;
  background: rgba(255,255,255,.07);
  color: var(--c-text);
  transition: background var(--trans);
}
.dl-act-btn:hover { background: rgba(255,255,255,.14); }
.dl-act-btn.primary { background: var(--c-accent-dim); color: var(--c-accent); }
.dl-act-btn.primary:hover { background: rgba(59,158,245,.28); }

.dl-card.done .dl-bar { background: var(--c-success); width: 100% !important; }
.dl-card.fail .dl-bar { background: var(--c-danger);  width: 100% !important; }

/* ═══════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(5,10,40,.88);
  backdrop-filter: blur(8px);
  border: 1px solid var(--c-border);
  color: var(--c-text-hi);
  padding: 7px 18px;
  border-radius: 20px;
  font-size: 12px;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
  z-index: 9999;
  transition: opacity .2s, transform .2s;
  box-shadow: var(--shadow);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.warn  { border-color: var(--c-warn);    color: var(--c-warn); }
#toast.info  { border-color: var(--c-accent);  color: var(--c-accent); }
#toast.error { border-color: var(--c-danger);  color: var(--c-danger); }
</style>
</head>
<body>

<!-- ═══════════ TOP BAR ═══════════ -->
<div id="bar">

  <!-- Back / Forward / Reload / Home -->
  <button class="nbtn" id="btn-back"   title="Back  Alt+←"    onclick="WMS.back()"    disabled>&#8592;</button>
  <button class="nbtn" id="btn-fwd"    title="Forward  Alt+→"  onclick="WMS.forward()" disabled>&#8594;</button>
  <button class="nbtn" id="btn-reload" title="Reload  Ctrl+R"  onclick="WMS.reload()">&#8635;</button>
  <button class="nbtn" id="btn-home"   title="Home"            onclick="WMS.home()">&#8962;</button>

  <div class="sep"></div>

  <!-- Tab strip -->
  <div id="tab-scroll"></div>

  <!-- New tab -->
  <button id="btn-new" title="New Tab  Ctrl+T" onclick="WMS.openTab(null)">+</button>

  <div class="sep"></div>

  <!-- Print -->
  <button class="abtn hi" title="Print Page  Ctrl+P" onclick="WMS.print()">
    🖨 <span>Print</span>
  </button>

  <!-- Save PDF -->
  <button class="abtn" title="Save as PDF" onclick="WMS.savePDF()">
    📄 <span>Save PDF</span>
  </button>

  <!-- Downloads folder -->
  <button class="abtn" title="Open Downloads Folder" onclick="WMS.openDownloads()">
    📂 <span>Downloads</span>
  </button>

  <div class="sep"></div>

  <!-- Zoom -->
  <div id="zoom-grp">
    <button class="nbtn" title="Zoom Out  Ctrl+-" onclick="WMS.zoomOut()" style="font-size:18px;font-weight:700;">−</button>
    <span id="zoom-lbl">100%</span>
    <button class="nbtn" title="Zoom In  Ctrl++" onclick="WMS.zoomIn()"  style="font-size:18px;font-weight:700;">+</button>
    <button class="abtn" title="Reset Zoom  Ctrl+0" onclick="WMS.zoomReset()" style="font-size:10px;padding:0 7px;height:28px;">1:1</button>
  </div>

  <div class="sep"></div>

  <!-- Find -->
  <button id="btn-find" title="Find in Page  Ctrl+F" onclick="toggleFind()">🔍</button>

</div>

<!-- ═══════════ FIND BAR ═══════════ -->
<div id="find-bar">
  <span style="color:var(--c-text-dim);font-size:14px">🔍</span>
  <input id="find-inp" type="text" placeholder="Find in page…"
         oninput="onFindInput()" onkeydown="onFindKey(event)"/>
  <span id="find-count"></span>
  <button class="find-btn" title="Previous  Shift+Enter" onclick="WMS.findPrev(document.getElementById('find-inp').value)">&#8593;</button>
  <button class="find-btn" title="Next  Enter"           onclick="WMS.findNext(document.getElementById('find-inp').value)">&#8595;</button>
  <button class="find-btn" title="Close  Esc"            onclick="closeFind()" style="color:var(--c-danger)">✕</button>
</div>

<!-- ═══════════ DOWNLOAD TRAY ═══════════ -->
<div id="dl-tray"></div>

<!-- ═══════════ TOAST ═══════════ -->
<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     RENDERER SCRIPT
     All communication with Electron goes through window.WMS
     (exposed by preload.js via contextBridge).
════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── State ────────────────────────────────────────────────── */
/** @type {Map<number,{id,title,url,loading,favicon,canBack,canFwd}>} */
const tabMap  = new Map();
let   activeId = null;
/** @type {Map<string,{el:HTMLElement,savePath:string}>} */
const dlCards = new Map();

/* ── DOM shortcuts ──────────────────────────────────────── */
const $      = id => document.getElementById(id);
const strip  = $('tab-scroll');
const zoomLbl= $('zoom-lbl');

/* ════════════════════════════════════════════════════════════
   IPC LISTENERS  (main → renderer)
════════════════════════════════════════════════════════════ */

WMS.on.tabOpened(({ id, title, url }) => {
  tabMap.set(id, { id, title, url, loading: true, favicon: null, canBack: false, canFwd: false });
  activeId = id;
  render();
});

WMS.on.tabClosed(({ id, nextId }) => {
  tabMap.delete(id);
  activeId = nextId;
  render();
});

WMS.on.tabActive(({ id, canBack, canFwd, zoom }) => {
  activeId = id;
  const t  = tabMap.get(id);
  if (t) { t.canBack = canBack; t.canFwd = canFwd; }
  render();
  setZoomLabel(zoom);
  syncNav(canBack, canFwd);
});

WMS.on.tabUpdate(({ id, title, url }) => {
  const t = tabMap.get(id); if (!t) return;
  t.title = title; t.url = url;
  render();
});

WMS.on.tabLoading(({ id, v }) => {
  const t = tabMap.get(id); if (!t) return;
  t.loading = v;
  render();
});

WMS.on.tabFavicon(({ id, url }) => {
  const t = tabMap.get(id); if (!t) return;
  t.favicon = url;
  render();
});

WMS.on.navState(({ id, canBack, canFwd }) => {
  const t = tabMap.get(id); if (!t) return;
  t.canBack = canBack; t.canFwd = canFwd;
  if (id === activeId) syncNav(canBack, canFwd);
});

WMS.on.navBlocked(host => toast(`🚫 Blocked: ${host}`, 'warn'));

WMS.on.zoomChanged(({ zoom }) => setZoomLabel(zoom));

WMS.on.toast(({ msg, type }) => toast(msg, type));

WMS.on.findOpen(() => toggleFind());

/* ── Download events ──────────────────────────────────────── */

WMS.on.dlStart(({ id, filename, total }) => {
  const card = makeDLCard(id, filename, total);
  $('dl-tray').prepend(card.el);
  dlCards.set(id, card);
  setTimeout(() => { if (card.el.parentNode) card.el.remove(); }, 40_000);
});

WMS.on.dlProgress(({ id, recv, total, pct }) => {
  const card = dlCards.get(id); if (!card) return;
  const bar  = card.el.querySelector('.dl-bar');
  const stat = card.el.querySelector('.dl-stat');
  if (pct >= 0) {
    bar.style.width = pct + '%';
    bar.classList.remove('indet');
    stat.textContent = `${pct}%  ·  ${fmtBytes(recv)} / ${fmtBytes(total)}`;
  } else {
    bar.classList.add('indet');
    stat.textContent = `${fmtBytes(recv)} downloaded…`;
  }
});

WMS.on.dlComplete(({ id, filename, savePath }) => {
  let card = dlCards.get(id);
  if (!card) {
    // PDF saves come here without a prior dl:start (printToPDF)
    card = makeDLCard(id, filename, 1);
    $('dl-tray').prepend(card.el);
    dlCards.set(id, card);
  }
  card.savePath = savePath;
  card.el.classList.add('done');
  card.el.querySelector('.dl-stat').textContent = '✅ Saved to Downloads';
  const acts = card.el.querySelector('.dl-actions');
  acts.querySelector('.open-btn').onclick  = () => WMS.openDownloads();
  acts.querySelector('.show-btn').onclick  = () => WMS.openDownloads();
  setTimeout(() => { card.el.remove(); dlCards.delete(id); }, 10_000);
});

WMS.on.dlError(({ id, filename }) => {
  const card = dlCards.get(id); if (!card) return;
  card.el.classList.add('fail');
  card.el.querySelector('.dl-stat').textContent = '❌ Download failed or cancelled';
  card.el.querySelector('.dl-actions').querySelector('.open-btn').textContent = 'Retry';
  setTimeout(() => { card.el.remove(); dlCards.delete(id); }, 6_000);
});

/* ════════════════════════════════════════════════════════════
   TAB RENDERING
════════════════════════════════════════════════════════════ */

function render() {
  strip.innerHTML = '';
  tabMap.forEach(t => strip.appendChild(makeTabEl(t)));
  scrollToActive();
  const cur = tabMap.get(activeId);
  syncNav(cur?.canBack ?? false, cur?.canFwd ?? false);
}

function makeTabEl(t) {
  const isActive = t.id === activeId;
  const el = document.createElement('div');
  el.className = 'tab' + (isActive ? ' active' : '') + (t.loading ? ' loading' : '');
  el.title = t.url || t.title;
  el.onclick = () => WMS.switchTab(t.id);

  // Spinner
  const spin = document.createElement('div');
  spin.className = 'tab-spin';

  // Favicon
  let fav;
  if (t.favicon) {
    fav = document.createElement('img');
    fav.className = 'tab-fav';
    fav.src = t.favicon;
    fav.onerror = () => { fav.replaceWith(ph()); };
  } else {
    fav = ph();
  }

  // Title
  const ttl = document.createElement('span');
  ttl.className = 'tab-ttl';
  ttl.textContent = t.title || 'New Tab';

  // Close
  const x = document.createElement('button');
  x.className = 'tab-x';
  x.innerHTML = '&#215;';
  x.title = 'Close Tab';
  x.onclick = e => { e.stopPropagation(); WMS.closeTab(t.id); };

  el.append(spin, fav, ttl, x);
  return el;
}

function ph() {
  const d = document.createElement('div');
  d.className = 'tab-fav-ph';
  return d;
}

function scrollToActive() {
  const active = strip.querySelector('.tab.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
}

function syncNav(canBack, canFwd) {
  $('btn-back').disabled = !canBack;
  $('btn-fwd').disabled  = !canFwd;
}

function setZoomLabel(pct) {
  zoomLbl.textContent = pct + '%';
}

/* ════════════════════════════════════════════════════════════
   FIND IN PAGE
════════════════════════════════════════════════════════════ */

let findOpen = false;

function toggleFind() {
  findOpen = !findOpen;
  const bar = $('find-bar');
  bar.classList.toggle('open', findOpen);
  if (findOpen) {
    $('find-inp').focus();
    $('find-inp').select();
  } else {
    WMS.findStop();
    $('find-inp').value = '';
    $('find-count').textContent = '';
  }
}

function closeFind() {
  if (findOpen) toggleFind();
}

function onFindInput() {
  const q = $('find-inp').value.trim();
  if (q) WMS.findStart(q); else WMS.findStop();
}

function onFindKey(e) {
  if (e.key === 'Escape')     { closeFind(); return; }
  if (e.key === 'Enter') {
    e.shiftKey ? WMS.findPrev($('find-inp').value) : WMS.findNext($('find-inp').value);
  }
}

// Ctrl+F in the shell itself (for keyboard users)
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); toggleFind(); }
  if (e.key === 'Escape' && findOpen) closeFind();
});

/* ════════════════════════════════════════════════════════════
   DOWNLOAD CARDS
════════════════════════════════════════════════════════════ */

function makeDLCard(id, filename, total) {
  const el = document.createElement('div');
  el.className = 'dl-card';
  el.innerHTML = `
    <div class="dl-row1">
      <span class="dl-ico">${fileIcon(filename)}</span>
      <span class="dl-name" title="${esc(filename)}">${esc(filename)}</span>
      <button class="dl-dismiss" onclick="this.closest('.dl-card').remove()">✕</button>
    </div>
    <div class="dl-track"><div class="dl-bar indet"></div></div>
    <div class="dl-stat">Downloading…</div>
    <div class="dl-actions">
      <button class="dl-act-btn primary open-btn">📂 Open Folder</button>
      <button class="dl-act-btn show-btn">Show File</button>
    </div>
  `;
  return { el, savePath: null };
}

function fileIcon(name) {
  const e = (name || '').split('.').pop().toLowerCase();
  return ({
    pdf:'📄', xls:'📊', xlsx:'📊', csv:'📊', ods:'📊',
    doc:'📝', docx:'📝', txt:'📝', odt:'📝', rtf:'📝', md:'📝',
    zip:'📦', rar:'📦', '7z':'📦', gz:'📦', tar:'📦',
    png:'🖼', jpg:'🖼', jpeg:'🖼', gif:'🖼', svg:'🖼', webp:'🖼', bmp:'🖼', ico:'🖼',
    mp4:'🎬', avi:'🎬', mov:'🎬', mkv:'🎬',
    mp3:'🎵', wav:'🎵', ogg:'🎵', flac:'🎵',
    exe:'⚙️', msi:'⚙️', apk:'📱',
    html:'🌐', css:'🎨', js:'📜', py:'🐍', php:'🐘', java:'☕',
    json:'📋', xml:'📋', sql:'🗄',
  })[e] || '⬇️';
}

/* ════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════ */

let _tt;
function toast(msg, type = '') {
  const el = $('toast');
  el.textContent = msg;
  el.className   = 'show' + (type ? ' ' + type : '');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.className = '', 3000);
}

/* ════════════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════════════ */

function fmtBytes(b) {
  if (!b || b < 0) return '?';
  if (b < 1024)            return b + ' B';
  if (b < 1024 * 1024)     return (b / 1024).toFixed(1) + ' KB';
  if (b < 1024 ** 3)       return (b / 1024 / 1024).toFixed(1) + ' MB';
  return (b / 1024 ** 3).toFixed(2) + ' GB';
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
